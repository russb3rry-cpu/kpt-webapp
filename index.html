<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Расписание КПТ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1d9bf0, #0f172a);
      color: #fff;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      opacity: 0.85;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    label {
      font-size: 14px;
      opacity: 0.9;
    }

    select, button {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      margin-bottom: 14px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
    }

    select {
      background: #fff;
      color: #111;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .lesson {
      background: rgba(255, 255, 255, 0.16);
      padding: 14px;
      border-radius: 16px;
      margin-top: 12px;
      line-height: 1.5;
    }

    .footer {
      text-align: center;
      font-size: 13px;
      opacity: 0.75;
      margin-top: 18px;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="header">
      <h1>📅 Расписание КПТ</h1>
      <p>Мини-приложение для просмотра расписания</p>
    </div>

    <div class="card">
      <label>Выберите группу</label>
      <select id="group">
        <option>ИС25-1</option>
        <option>ИС25-2</option>
        <option>ИС25-3</option>

        <option>ЛС25-1</option>
        <option>ЛС25-2</option>

        <option>МР25-1</option>
        <option>МР25-2</option>

        <option>МЭ25-1</option>
        <option>МЭ25-2</option>
        <option>МЭ25-3</option>

        <option>СТ25-1</option>
        <option>СТ25-2</option>

        <option>ТД25-1</option>
        <option>ТД25-2</option>
        <option>ТД25-3</option>

        <option>БП25</option>
      </select>

      <label>Выберите день</label>
      <select id="day">
        <option>Понедельник</option>
        <option>Вторник</option>
        <option>Среда</option>
        <option>Четверг</option>
        <option>Пятница</option>
        <option>Суббота</option>
      </select>

      <button onclick="showSchedule()">Показать расписание</button>
    </div>

    <div class="card" id="result">
      Выберите группу и день недели.
    </div>

    <div class="footer">
      КПТ • Telegram Web App
    </div>

  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function showSchedule() {
      const group = document.getElementById("group").value;
      const day = document.getElementById("day").value;

      document.getElementById("result").innerHTML = `
        <h2>👥 ${group}</h2>
        <h3>📌 ${day}</h3>

        <div class="lesson">
          🕘 <b>1 пара | 8:00–9:30</b><br>
          📚 Расписание отображается в Telegram-боте
        </div>

        <div class="lesson">
          Чтобы получить актуальные данные, нажмите кнопку расписания в боте.
        </div>
      `;
    }
  </script>
</body>
</html>
